<section id="certifications" class="py-16 px-6 bg-[var(--color-background)]">
    <div class="max-w-6xl mx-auto">
    <h2 class="text-4xl font-bold text-center mb-12">
        <span class="text-[var(--color-primary)]">
        Certifications
        </span>
    </h2>
    <div class="grid md:grid-cols-2 gap-6">
        @for (cert of certifications; track cert.title) {
        <div class="group border border-[var(--color-border)] bg-[var(--color-surface)] transition-colors hover:border-gray-300 rounded overflow-hidden">
            <div class="p-6 flex flex-col h-full">
            <div class="flex justify-between items-start mb-3">
                <div>
                <div class="flex items-center mb-1">
                    <h3 class="text-lg font-bold text-[var(--color-primary)] tracking-tight">
                    {{ cert.title }}
                    </h3>
                </div>
                <p class="text-[var(--color-accent)] font-medium">{{ cert.provider }}</p>
                </div>
                <a [href]="cert.url"
                   target="_blank"
                   rel="noopener noreferrer"
                class="h-9 w-9 flex-shrink-0 ml-4 rounded border border-transparent flex items-center justify-center hover:bg-gray-50 hover:border-gray-200 transition-colors">
                <!-- External Link Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-[var(--color-secondary)]">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                    <polyline points="15 3h6v6"></polyline>
                    <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
                </a>
            </div>

            <div class="flex items-center text-sm text-[var(--color-secondary)] font-medium mt-auto pt-2">
                <!-- Calendar Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mr-1">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span>Issued {{ cert.date }}</span>
            </div>
            </div>
        </div>
        }
    </div>
</div>
</section>
