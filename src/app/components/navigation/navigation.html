<nav class="fixed top-0 w-full bg-[var(--color-background)] z-50 border-b border-[var(--color-border)] opacity-95">
    <div class="max-w-6xl mx-auto px-6 py-4">
        <div class="flex justify-between items-center">
            <!-- Logo -->
            <a 
                (click)="scrollToSection('about')"
                class="text-xl font-bold text-[var(--color-primary)] cursor-pointer tracking-tight"
            >
                Om Magdum
            </a>

            <!-- Desktop Navigation -->
            <div class="hidden md:flex space-x-8">
                @for (item of navItems; track item.id) {
                    <a (click)="scrollToSection(item.id)"
                        class="text-[var(--color-primary)] opacity-80 hover:opacity-100 hover:text-[var(--color-accent)] transition-colors duration-200 font-medium cursor-pointer"
                    >
                        {{ item.text }}
                    </a>
                }
            </div>

            <!-- Mobile menu button -->
            <div class="md:hidden">
                <button 
                    (click)="toggleMenu()"
                    type="button" 
                    class="text-[var(--color-primary)] hover:text-[var(--color-accent)] focus:outline-none"
                    aria-label="Toggle menu"
                >
                    <svg 
                        class="w-6 h-6" 
                        fill="none" 
                        stroke="currentColor" 
                        viewBox="0 0 24 24"
                        [class.hidden]="isMenuOpen"
                        stroke-width="1.5"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                    <svg 
                        class="w-6 h-6" 
                        fill="none" 
                        stroke="currentColor" 
                        viewBox="0 0 24 24"
                        [class.hidden]="!isMenuOpen"
                        stroke-width="1.5"
                    >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile menu -->
        <div 
            class="md:hidden transition-all duration-300 ease-in-out overflow-hidden"
            [class.max-h-0]="!isMenuOpen"
            [class.max-h-96]="isMenuOpen"
        >
            <div class="pt-4 pb-2 space-y-2">
                @for (item of navItems; track item.id) {
                    <a 
                        (click)="scrollToSection(item.id)"
                        class="block px-3 py-2 rounded border border-transparent text-base font-medium text-[var(--color-primary)] hover:border-[var(--color-border)] hover:bg-gray-50"
                    >
                        {{ item.text }}
                    </a>
                }
            </div>
        </div>
    </div>
</nav>
