<section id="skills" class="py-16 px-6 bg-[var(--color-background)]">
    <div class="max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold text-center mb-12">
            <span class="text-[var(--color-primary)]">
                Technical Skills
            </span>
        </h2>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            @for (category of skills; track category.name) {
            <div class="border border-[var(--color-border)] bg-[var(--color-surface)] rounded overflow-hidden transition-colors hover:border-gray-300">
                <div class="p-6">
                <h3 class="text-lg font-bold text-[var(--color-primary)] mb-4 tracking-tight">
                    {{ category.name }}
                </h3>
                <div class="flex flex-wrap gap-2">
                    @for (skill of category.skills; track skill) {
                    <span class="px-3 py-1.5 text-xs border border-[var(--color-border)] bg-white text-[var(--color-primary)] rounded font-mono">
                        {{ skill }}
                    </span>
                    }
                </div>
                </div>
            </div>
            }
        </div>
    </div>
</section>
